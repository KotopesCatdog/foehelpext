<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактор города</title>

    <style>
        body { display: flex; margin: 0; font-family: Arial, sans-serif; }
        .container { display: flex; position: relative; }
        .grid { display: grid; grid-template-columns: repeat(72, 20px); grid-template-rows: repeat(72, 20px); background-color: #eee; position: relative; }
        .cell {
            width: 20px; height: 20px; background-color: #fff;
            border-right: 0.25px solid #000; border-bottom: 0.25px solid #000;
            box-sizing: border-box;
        }
        .thick-right { border-right: 2px solid #000; }
        .thick-bottom { border-bottom: 2px solid #000; }
        .thick-both { border-right: 2px solid #000; border-bottom: 2px solid #000; }

        .input-container { margin-left: 20px; padding: 10px; background-color: #f9f9f9; border: 1px solid #ccc; width: 320px; }
        textarea { width: 100%; height: 200px; margin-bottom: 10px; }
        button { padding: 6px 10px; font-size: 14px; cursor: pointer; }
        .button-row { display: flex; gap: 5px; margin-bottom: 6px; align-items: center; flex-wrap: wrap; }
        .button-row button { flex: 1; min-width: 90px; }

        .figure {
            position: absolute; background-color: rgba(0,0,0,0.5); box-sizing: border-box;
            cursor: grab; display: flex; align-items: center; justify-content: center;
            font-size: 10px; color: white; text-align: center; overflow: hidden;
            padding: 2px; box-shadow: inset 0 0 0 2px black; user-select: none;
            white-space: pre-wrap; line-height: 1.2; z-index: 10;
        }
        .figure.ratusha { color: black; }
        .gray { background-color: #999; }
        .yellow { background-color: #ff0; }
        .blue { background-color: #00f; }
        .red { background-color: #f00; }
        .default-color { background-color: #41adfa; }
        .light-green { background-color: #90ee90; }
        .green { background-color: #008000; }

        .tooltip { position: fixed; background-color: rgba(0,0,0,0.8); color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; white-space: nowrap; pointer-events: none; display: none; z-index: 20; }
        .boundary { background-color: rgba(0, 255, 0, 0.3); }
        .blinking { animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .yellow-outline { outline: 8px solid #ff0; outline-offset: -2px; }

        #road-result { margin-top: 8px; padding: 8px; background: #e8f5e8; border: 1px solid #4caf50; border-radius: 4px; min-height: 22px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="grid" id="grid"></div>
        
        <div class="input-container">
            <a href="http://www.foehelp.ru/cityplanhelp.html" target="_blank">⛄ Инструкция ⛄</a>
            <textarea id="data-input" placeholder="Вставьте данные из Обзора города..."></textarea>

            <div class="button-row"><button id="btnStart">Старт</button></div>

            <div class="button-row">
                <button id="btnResetFigures">Очистить поле</button>
                <button id="btnResetInput">Сброс данных</button>
            </div>

            <div class="button-row">
                <button id="btnBoundary">Границы</button>
                <button id="btnRemoveRoads">- дороги</button>
                <input type="text" id="figure-name-input" placeholder="Имя фигуры" style="width: 110px;">
            </div>

            <div class="button-row">
                <select id="height-select">
                    <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                    <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                    <option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option>
                </select>
                <select id="width-select">
                    <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                    <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                    <option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option>
                </select>
                <select id="color-select">
                    <option value="gray">Дорога</option>
                    <option value="blue">Бездорожные</option>
                    <option value="red">ВС</option>
                    <option value="green">Декор</option>
                    <option value="light-green">Светло-зеленый</option>
                    <option value="default-color">Голубой</option>
                </select>
                <button id="btnCreateFigure">Создать</button>
            </div>

            <div class="button-row">
                <button id="btnSaveFile">Сохранить в файл</button>
                <button id="btnLoadFile">Загрузить файл</button>
                <input type="file" id="fileInput" style="display: none;" accept=".txt">
            </div>

            <div class="button-row">
                <button id="btnCalculateRoads">Рассчитать дороги</button>
                <button id="btnTestOverlaps">Тест наложений</button>
            </div>

            <div id="road-result"></div>
        </div>
    </div>

    <div id="tooltip" class="tooltip"></div>
    <script src="cityplan.js"></script>
</body>
</html>
