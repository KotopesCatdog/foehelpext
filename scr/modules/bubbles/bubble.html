<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bubble Shooter</title>
    <link rel="icon" href="https://foehelp.ru/favicon.png" type="image/png">
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: #0a0f1e;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
        }

        .game-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        canvas {
            display: block;
            border-radius: 14px;
            cursor: crosshair;
            box-shadow: 0 0 0 3px #1e2a3a, 0 12px 40px rgba(0,0,0,0.7);
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            gap: 10px;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 60px;
            border: 1px solid #1e3a2e;
        }

        .label {
            font-size: 12px;
            color: #667;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .value {
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 8px #7eff5e;
        }

        .cell { display: flex; flex-direction: column; align-items: center; gap: 2px; }

        .next-bubble {
            width: 32px; height: 32px;
            border-radius: 50%;
        }

        button {
            background: #1a2e1a;
            border: 1px solid #3a6a3a;
            color: #9fdf9f;
            font-family: monospace;
            font-weight: bold;
            font-size: 14px;
            border-radius: 40px;
            padding: 6px 18px;
            cursor: pointer;
            transition: background 0.1s;
        }
        button:hover { background: #223a22; }
        button:active { transform: scale(0.96); }

        .hint {
            font-size: 12px;
            color: #445;
            text-align: center;
        }

        /* ── МОДАЛЬНЫЕ ОКНА ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }

        .modal-box {
            background: linear-gradient(135deg, #0a0f1e 0%, #16213e 100%);
            border: 3px solid #4ecca3;
            border-radius: 30px;
            padding: 30px 40px;
            text-align: center;
            box-shadow: 0 0 60px rgba(78,204,163,0.5);
            animation: modalPop 0.25s ease-out;
            min-width: 340px;
            max-width: 95vw;
            position: relative;
            font-family: 'Courier New', monospace;
        }

        @keyframes modalPop {
            from { transform: scale(0.8); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }

        .modal-box h2 {
            font-size: 28px;
            color: #4ecca3;
            text-shadow: 0 0 10px #4ecca3;
            margin: 0 0 18px;
            letter-spacing: 3px;
        }

        .modal-icon { font-size: 56px; margin-bottom: 6px; }

        .modal-close {
            position: absolute;
            top: 12px; right: 18px;
            background: none; border: none;
            color: #ff8888; font-size: 24px;
            cursor: pointer; padding: 0;
            line-height: 1;
        }

        .hs-list {
            max-height: 300px;
            overflow-y: auto;
            margin: 12px 0;
            background: rgba(0,0,0,0.45);
            border-radius: 14px;
            padding: 8px 6px;
            min-width: 300px;
        }
        .hs-item {
            display: flex;
            justify-content: space-between;
            padding: 7px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 15px;
        }
        .hs-item:last-child { border-bottom: none; }
        .hs-rank  { color: #ffaa44; font-weight: bold; width: 36px; }
        .hs-name  { flex: 1; color: #fff; text-align: left; }
        .hs-score { color: #4ecca3; font-weight: bold; }
        .hs-mine  { background: rgba(78,204,163,0.12); border-radius: 8px; }
        .hs-loading { text-align: center; padding: 20px; color: #aaa; }

        .modal-btn {
            background: linear-gradient(90deg, #4ecca3, #3ba87f);
            border: none; color: #fff;
            font-size: 16px; font-weight: bold;
            padding: 10px 24px; border-radius: 40px;
            cursor: pointer; transition: all 0.2s;
            font-family: 'Courier New', monospace;
            margin: 5px 4px 0;
        }
        .modal-btn:hover { transform: scale(1.04); box-shadow: 0 0 16px rgba(78,204,163,0.7); }
        .modal-btn.danger { background: linear-gradient(90deg, #e94560, #c72a48); }
        .modal-btn.danger:hover { box-shadow: 0 0 16px rgba(233,69,96,0.7); }

        .player-row {
            display: flex; align-items: center;
            justify-content: center; gap: 10px;
            margin: 14px 0;
            background: rgba(0,0,0,0.35);
            border-radius: 40px; padding: 8px 16px;
        }
        .player-row span { color: #88ff88; font-size: 15px; }
        #playerNameInput {
            background: #2a3622; border: 1px solid #4ecca3;
            color: #fff; padding: 6px 12px; border-radius: 20px;
            font-family: 'Courier New', monospace; font-size: 14px;
            width: 130px; text-align: center; outline: none;
        }
        .save-name-btn {
            background: #4ecca3; border: none; color: #fff;
            font-size: 16px; padding: 4px 10px;
            border-radius: 20px; cursor: pointer; transition: 0.2s;
        }
        .save-name-btn:hover { background: #3ba87f; }
        .modal-score-line {
            font-size: 18px; color: #ffdd88;
            margin: 8px 0;
            text-shadow: 0 0 6px #ffaa44;
        }
        .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }

        /* ── ПОЛОСКА ПРОГРЕССА ── */
        .progress-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            background: rgba(0,0,0,0.5);
            padding: 8px 18px;
            border-radius: 40px;
            border: 1px solid #1e3a2e;
            box-sizing: border-box;
        }
        .progress-label { font-size: 18px; }
        .progress-bar {
            flex: 1;
            height: 14px;
            background: #1a2a1a;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.5);
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #2ecc71, #f1c40f, #e74c3c);
            border-radius: 8px;
            transition: width 0.3s ease;
            box-shadow: 0 0 8px rgba(78,204,163,0.6);
        }
        .progress-text {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #88ff88;
            white-space: nowrap;
            min-width: 70px;
            text-align: right;
        }

        /* ── КНОПКА ЗАКРЫТИЯ ── */
        .close-btn {
            position: fixed;
            top: 14px;
            right: 18px;
            z-index: 9999;
            background: rgba(10,12,18,0.85);
            border: 1px solid #3e4a5a;
            color: #ff8888;
            font-size: 20px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            line-height: 1;
            padding: 0;
            font-family: monospace;
        }
        .close-btn:hover {
            background: rgba(233,69,96,0.2);
            border-color: #e94560;
            color: #ff4466;
            transform: scale(1.1);
        }
    </style>
</head>
<body>
<button class="close-btn" id="closeBtn" title="Закрыть игру">✕</button>
<div class="game-wrap">
    <canvas id="c" width="920" height="620"></canvas>
    <div class="info-panel">
        <div class="cell"><span class="label">Level</span><span class="value" id="levelVal">01</span></div>
        <div class="cell"><span class="label">Сложность</span><span class="value" id="diffVal">2</span></div>
        <div class="cell"><span class="label">Score</span><span class="value" id="scoreVal">00000</span></div>
        <div class="cell"><span class="label">Shots</span><span class="value" id="shotsVal">000</span></div>
        <div class="cell">
            <span class="label">Next</span>
            <div class="next-bubble" id="nextBubble"></div>
        </div>
        <button id="btnReset">↺ Reset</button>
    </div>
    <div class="hint">Клик = выстрел · <span style="color:#ffaa44">R/К</span> = сброс · <span style="color:#ffaa44">T/Е</span> = рекорды · <span style="color:#ffaa44">L/Д</span> = сложность</div>

    <!-- Полоска прогресса уровня -->
    <div class="progress-wrap">
        <span class="progress-label">💥</span>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="progress-text" id="progressText">0 / 500</span>
    </div>
</div>

<!-- ── МОДАЛЬ: ТАБЛИЦА РЕКОРДОВ ── -->
<div class="modal-overlay" id="hsModal">
    <div class="modal-box">
        <button class="modal-close" id="hsModalCloseTop">×</button>
        <div class="modal-icon">🏆</div>
        <h2>ТАБЛИЦА РЕКОРДОВ</h2>
        <div class="hs-list" id="hsList"><div class="hs-loading">Загрузка...</div></div>
        <button class="modal-btn" id="hsModalCloseBtn">ЗАКРЫТЬ</button>
    </div>
</div>

<!-- ── МОДАЛЬ: GAME OVER (сохранить/начать снова) ── -->
<div class="modal-overlay" id="gameOverModal">
    <div class="modal-box">
        <div class="modal-icon">💀</div>
        <h2>GAME OVER</h2>
        <div class="modal-score-line">Ваш счёт: <strong id="goScore">0</strong></div>
        <div class="player-row">
            <span>👤</span>
            <input type="text" id="playerNameInput" maxlength="20" placeholder="Ваш ник">
            <button class="save-name-btn" id="saveNameBtn" title="Запомнить ник">💾</button>
        </div>
        <div class="btn-row">
            <button class="modal-btn" id="btnSaveScore">🏆 СОХРАНИТЬ</button>
            <button class="modal-btn danger" id="btnRestartAfterLose">🔄 НАЧАТЬ СНОВА</button>
        </div>
    </div>
</div>

<!-- ── МОДАЛЬ: СЛОЖНОСТЬ ── -->
<div class="modal-overlay" id="difficultyModal">
    <div class="modal-box">
        <button class="modal-close" id="difficultyModalCloseTop">×</button>
        <div class="modal-icon">⚙️</div>
        <h2>СЛОЖНОСТЬ</h2>
        <p style="color:#88a; margin:10px 0 20px; font-size:14px;">Чем выше уровень — тем чаще появляются новые ряды шаров</p>
        <div id="difficultyOptions" style="display:flex; flex-direction:column; gap:8px; margin:15px 0;"></div>
        <button class="modal-btn" id="difficultyModalCloseBtn">ГОТОВО</button>
    </div>
</div>

<script src="bubble.js"></script>
</body>
</html>
