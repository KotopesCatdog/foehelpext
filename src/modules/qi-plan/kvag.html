<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QI-Plan Редактор</title>
<style>
* { box-sizing: border-box; }
body {
    background-color: #5E381A;
    display: flex;
    margin: 0;
    font-family: Arial, sans-serif;
}
.container { display: flex; position: relative; }
.grid {
    display: grid;
    grid-template-columns: repeat(28, 30px);
    grid-template-rows: repeat(28, 30px);
    background-color: #eee;
    position: relative;
    z-index: 1;
}
.grid.delete-mode { cursor: not-allowed; }
.cell {
    width: 30px;
    height: 30px;
    background-color: #fff;
    border-right: 0.375px solid #000;
    border-bottom: 0.375px solid #000;
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
}
</style>
</head>
<body>
<div class="container">
    <div class="grid" id="grid"></div>
</div>
<script src="kvag.js"></script>
</body>
</html>
