<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saturn Gate</title>
    <link rel="icon" href="https://foehelp.ru/favicon.png" type="image/png">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #222;
            color: #eee;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            margin: 30px 0 40px;
            font-size: 24px;
        }

        .titans-block {
            background: #333;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .titan-checkbox {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin: 15px 0;
            font-size: 18px;
        }

        .titan-checkbox input {
            margin-right: 12px;
            transform: scale(1.4);
        }

        .select-group {
            margin: 30px 0;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 18px;
        }

        select {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            background: #444;
            color: #eee;
            border: 1px solid #555;
            border-radius: 6px;
        }

        .single-level-checkbox {
            margin-top: 30px;
            font-size: 18px;
        }

        .single-level-checkbox input {
            margin-right: 10px;
            transform: scale(1.4);
        }

        #result {
            background: #333;
            padding: 25px;
            border-radius: 10px;
            margin-top: 40px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            font-size: 20px;
        }

        .data-item {
            margin: 20px 0;
        }

        .data-item span {
            font-weight: bold;
            color: #0f0;
        }

        .navigation-buttons {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
            justify-content: center;
            padding: 10px;
        }

        .back-button {
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #008080;
            border: 4px solid black;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.8);
            text-decoration: none;
            transition: all 0.3s;
            display: inline-block;
        }

        .back-button:hover {
            background-color: #00a0a0;
            box-shadow: 0 0 25px rgba(0, 255, 255, 1);
            transform: scale(1.05);
        }

        @media (max-width: 480px) {
            .navigation-buttons {
                flex-direction: column;
                align-items: center;
            }
            .back-button {
                width: 80%;
                text-align: center;
                padding: 8px 16px;
                font-size: 15px;
            }
            h1 { font-size: 20px; }
            .titan-checkbox, label, .single-level-checkbox { font-size: 16px; }
            select { font-size: 16px; padding: 10px; }
            #result { font-size: 18px; padding: 20px; }
        }
    </style>
</head>
<body>

<div class="content">
    <h1>Saturn Gate</h1>

    <div class="titans-block">
        <h3>Выберите ВС и уровень</h3>
        <div class="titan-checkbox">
            <input type="checkbox" id="hydra" value="hydra" checked>
            <label for="hydra">ГИДРА</label>
        </div>
        <div class="titan-checkbox">
            <input type="checkbox" id="centaur" value="centaur" checked>
            <label for="centaur">КЕНТАВР</label>
        </div>
        <div class="titan-checkbox">
            <input type="checkbox" id="pegasus" value="pegasus" checked>
            <label for="pegasus">ПЕГАС</label>
        </div>
    </div>

    <div class="select-group">
        <label for="fromLevel">От уровня:</label>
        <select id="fromLevel">
            <option value="foundation">Фундамент</option>
        </select>

        <label for="toLevel">До уровня:</label>
        <select id="toLevel">
            <option value="foundation">Фундамент</option>
        </select>

        <div class="single-level-checkbox">
            <input type="checkbox" id="singleLevel">
            <label for="singleLevel">Один уровень</label>
        </div>
    </div>

    <div id="result">
        <div class="data-item">Товары, каждого по: <span id="itemPer">-</span> тыс.</div>
        <div class="data-item">Товары, всего: <span id="total">-</span> тыс.</div>
        <div class="data-item">Монеты: <span id="coins">-</span> млн.</div>
    </div>
</div>

<script src="vstitan.js"></script>
</body>
</html>
