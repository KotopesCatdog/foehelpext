<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoE: Наборы выбора (Selection Kits)</title>
<style>
* { box-sizing: border-box; }
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #1a1a2e;
    color: #eee;
    padding: 20px;
    max-width: 1400px;
    margin: 0 auto;
}
h1 { text-align: center; color: #ffd700; margin-bottom: 5px; }
.subtitle { text-align: center; color: #888; margin-bottom: 20px; font-size: 14px; }
.search-panel { background: #252540; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
input#search {
    width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #4a4a6a;
    background: #2a2a3e; color: white; font-size: 16px; box-sizing: border-box;
}
input#search:focus { outline: none; border-color: #ffd700; }
.filter-row { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
.filter-group { display: flex; gap: 8px; background: #2a2a3e; padding: 5px 12px; border-radius: 8px; flex-wrap: wrap; }
.filter-btn { padding: 6px 12px; background: #1a1a2e; color: white; border: 1px solid #4a4a6a; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
.filter-btn:hover { background: #3a3a5e; }
.filter-btn.active { background: #ffd700; color: #1a1a2e; border-color: #ffd700; }
.stats { background: #252540; padding: 10px 15px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
.controls { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; flex-wrap: wrap; }
.controls button {
    padding: 8px 16px;
    background: #0066cc;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
}
.controls button:hover { background: #0055aa; }

.kit-card { background: #252540; border-radius: 12px; margin-bottom: 12px; overflow: hidden; border: 1px solid #3a3a5e; transition: all 0.2s; }
.kit-card:hover { border-color: #ffd700; }
.kit-header { padding: 12px 15px; cursor: pointer; display: flex; align-items: center; gap: 10px; background: #2a2a3e; }
.kit-header::before { content: "▶"; transition: transform 0.2s; color: #ffd700; font-size: 12px; }
.kit-card.open .kit-header::before { content: "▼"; }
.kit-name { flex: 1; font-weight: bold; font-size: 15px; color: #4fc3f7; }
.kit-id { font-size: 11px; color: #888; font-family: monospace; background: #1a1a2e; padding: 2px 6px; border-radius: 4px; }
.kit-badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #1a1a2e; }
.kit-badge.building { background: #2e7d32; color: #a5d6a7; }
.kit-badge.upgrade { background: #ef6c00; color: #ffe0b2; }
.kit-badge.selection { background: #6a1b9a; color: #ce93d8; }
.kit-badge.mixed { background: #c62828; color: #ffcdd2; }
.kit-content { display: none; padding: 15px; border-top: 1px solid #3a3a5e; }
.kit-card.open .kit-content { display: block; }
.description { background: #1a1a2e; padding: 8px 12px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; color: #ccc; font-style: italic; }
.choices-title { font-size: 13px; font-weight: bold; color: #ffd700; margin-bottom: 10px; }
.choices-grid { display: flex; flex-wrap: wrap; gap: 10px; }
.choice-item { background: #1a1a2e; border-radius: 8px; padding: 8px 12px; min-width: 180px; flex: 1 0 auto; max-width: 220px; border-left: 3px solid; }
.choice-item.building { border-left-color: #4caf50; }
.choice-item.upgrade_kit { border-left-color: #ff9800; }
.choice-item.selection_kit { border-left-color: #9c27b0; }
.choice-item.default { border-left-color: #888; }
.choice-name { font-weight: bold; font-size: 13px; }
.choice-type { font-size: 10px; color: #888; margin-top: 4px; }
.choice-id { font-size: 9px; color: #666; font-family: monospace; margin-top: 4px; word-break: break-all; }
mark { background-color: #ffd700; color: #1a1a2e; padding: 0 2px; border-radius: 3px; }
.empty-state { text-align: center; padding: 50px; color: #888; }
.loading { text-align: center; padding: 50px; color: #ffd700; font-size: 18px; }
.error-state { text-align: center; padding: 50px; color: #f44336; }
.error-state h3 { margin-bottom: 10px; }
.error-state p { color: #aaa; font-size: 14px; }

/* Переключатель языка */
.lang-switcher { display: flex; justify-content: center; gap: 8px; }
.lang-switcher button { padding: 5px 14px; font-size: 13px; font-weight: bold; color: #ffd700; background: transparent; border: 2px solid #555; border-radius: 16px; cursor: pointer; transition: all 0.2s; }
.lang-switcher button:hover, .lang-switcher button.active { background: #444; border-color: #ffd700; }
</style>
</head>
<body>

<h1 id="kits-title">🎁 FoE: Наборы выбора (Selection Kits)</h1>
<div class="subtitle" id="kits-subtitle">Поиск по названиям наборов и предметам, которые в них входят</div>

<div class="search-panel">
    <input type="text" id="search" placeholder="🔍 Поиск...">
    <div class="filter-row">
        <div class="filter-group">
            <span style="color:#888; font-size:12px;" id="kits-filter-label">📋 Тип набора:</span>
            <button class="filter-btn active" data-filter="all" id="filter-all">Все</button>
            <button class="filter-btn" data-filter="building" id="filter-building">🏠 Здания</button>
            <button class="filter-btn" data-filter="upgrade" id="filter-upgrade">🔧 Апгрейды</button>
            <button class="filter-btn" data-filter="mixed" id="filter-mixed">🔄 Смешанные</button>
        </div>
    </div>
</div>

<div class="controls">
    <button id="toggle-all-btn">📂 Развернуть все</button>
    <div class="lang-switcher">
        <button id="lang-ru">RU</button>
        <button id="lang-en">EN</button>
    </div>
</div>

<div class="stats" id="stats"></div>
<div id="results">
    <div class="loading" id="loading-state">⏳ Загрузка данных...</div>
</div>

<script src="kits.js"></script>
</body>
</html>
